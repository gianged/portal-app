# cargo-make tasks for portal-app. `cargo make <task>`; `cargo make --list-all-steps` to list.
# Surfaced in RustRover via .idea/runConfigurations/.
#
# First run:  cargo make bootstrap   (infra + schemas, idempotent)
# Dev:        cargo make run-all      (server + workers + frontend on the host)
# Prod-like:  cargo make up           (full containerized stack)

# sqlx-prepare and the services read .env; cargo-make never overrides already-set vars.
env_files = [".env"]

[config]
default_to_workspace = false
skip_core_tasks = true

# ---------------------------------------------------------------- Bootstrap

[tasks.bootstrap]
description = "Bootstrap the dependency stack (idempotent): stores, OpenFGA migrate + store, schemas."
command = "sh"
args = ["infra/scripts/init.sh"]

# Windows has no `sh` on PATH; point straight at Git Bash's sh.
[tasks.bootstrap.windows]
command = "C:\\Program Files\\Git\\usr\\bin\\sh.exe"
args = ["infra/scripts/init.sh"]

[tasks.backup]
description = "Back up Postgres + ScyllaDB on demand to ./backups (BACKUP_DIR)."
command = "sh"
args = ["infra/scripts/backup.sh"]

[tasks.backup.windows]
command = "C:\\Program Files\\Git\\usr\\bin\\sh.exe"
args = ["infra/scripts/backup.sh"]

# Optional demo data (re-runnable); the schema's default admin exists without this.
[tasks.seed]
description = "Load optional demo data: ~100 employees + org + sample activity, then sync OpenFGA tuples."
command = "sh"
args = ["infra/seed/seed.sh"]

[tasks.seed.windows]
command = "C:\\Program Files\\Git\\usr\\bin\\sh.exe"
args = ["infra/seed/seed.sh"]

# ---------------------------------------------------------------- Schema / sqlx
# 10-init.sql is the source of truth. To change it, reinit the dev DB (Postgres inits
# only on an empty volume):
#   docker compose --env-file .env -f infra/docker-compose.infra.yml down -v
#   cargo make bootstrap && cargo make sqlx-prepare   # regen .sqlx, commit with the schema

[tasks.sqlx-prepare]
description = "Regenerate the committed .sqlx offline query cache (needs an initialized dev DB)."
command = "cargo"
# Doubled --workspace is required: the second is forwarded to the cargo check sqlx shells out to.
args = ["sqlx", "prepare", "--workspace", "--", "--workspace", "--exclude", "frontend"]

# ------------------------------------------------------------- Stack lifecycle
# infra-up/down: dependency stack only (Postgres, Redis, Scylla, OpenFGA) for the host-run flow.
# up/down:       full containerized stack incl. server, workers, frontend (prod-like).
# Both pass --env-file so Compose honors the repo-root .env.

[tasks.up]
description = "Bring the full containerized stack up (deps + server + workers + frontend)."
command = "docker"
args = ["compose", "--env-file", ".env", "-f", "infra/docker-compose.yml", "up", "-d", "--wait"]

[tasks.down]
description = "Stop the full containerized stack, keeping data volumes."
command = "docker"
args = ["compose", "--env-file", ".env", "-f", "infra/docker-compose.yml", "down"]

[tasks.infra-up]
description = "Bring the dependency stack up in the background (deps only)."
command = "docker"
args = ["compose", "--env-file", ".env", "-f", "infra/docker-compose.infra.yml", "up", "-d", "--wait"]

[tasks.infra-down]
description = "Stop the dependency stack, keeping data volumes."
command = "docker"
args = ["compose", "--env-file", ".env", "-f", "infra/docker-compose.infra.yml", "down"]

# ---------------------------------------------------------------- Native services
# Run on the host so breakpoints / hot-reload work. `-p` scopes the package: a bare
# `--bin` fails under run-all's parallelism ("no bin target in default-run packages").

[tasks.run-server]
description = "Run the backend server natively."
command = "cargo"
args = ["run", "-p", "server", "--bin", "server"]
env = { RUST_LOG = "info,portal=debug" }

[tasks.run-workers]
description = "Run the background workers natively."
command = "cargo"
args = ["run", "-p", "workers", "--bin", "workers"]
env = { RUST_LOG = "info,portal=debug" }

# `--config` not cargo-make `cwd`: cwd does a process-wide chdir that races run-all's siblings.
[tasks.run-frontend]
description = "Run the Leptos dev server (trunk serve, port 8081)."
command = "trunk"
args = ["serve", "--config", "crates/frontend/Trunk.toml"]

# ---------------------------------------------------------------- Full stack

[tasks.run-all]
description = "Run server + workers + frontend natively in parallel."
run_task = { name = ["run-server", "run-workers", "run-frontend"], parallel = true }

# ---------------------------------------------------------------- Quality

[tasks.test]
description = "Run all tests (unit, integration, doc) across the workspace."
command = "cargo"
args = ["test", "--workspace"]

[tasks.clippy]
description = "Lint with clippy, deny warnings."
command = "cargo"
args = ["clippy", "--workspace", "--all-targets", "--", "-D", "warnings"]

[tasks.build]
description = "Build the entire workspace."
command = "cargo"
args = ["build", "--workspace"]

[tasks.boot-resilience-test]
description = "E2E: server/workers must retry while infra is down, then give up on deadline (needs debug binaries)."
command = "go"
args = ["run", ".", "boot-resilience"]
cwd = "loadtest"

[tasks.race-test]
description = "E2E: concurrent writers on the same entity must not lose updates (needs running seeded stack)."
command = "go"
args = ["run", ".", "race"]
cwd = "loadtest"
