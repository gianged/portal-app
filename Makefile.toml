# cargo-make tasks for portal-app.
#
# Install once: `cargo install cargo-make --locked`
# Run a task:   `cargo make <task>`
# List tasks:   `cargo make --list-all-steps`
#
# Tasks are surfaced in RustRover via .idea/runConfigurations/.
#
# Typical flow:
#
#   cargo make init       # bring up infra + bootstrap (idempotent — safe to re-run)
#   cargo make run-all
#
# If something goes wrong, wipe volumes and re-init:
#   docker compose -f infra/docker-compose.infra.yml down -v
#   cargo make init

[config]
default_to_workspace = false
skip_core_tasks = true

# ---------------------------------------------------------------- Bootstrap
# Single idempotent entry point:
#   - First run: creates volumes, runs Postgres init scripts, applies Scylla
#     schema, runs OpenFGA migrations, bootstraps the OpenFGA store.
#   - Subsequent runs: no-op (init scripts only fire on empty volumes;
#     openfga-init is idempotent — reuses the existing 'portal' store).

[tasks.init]
description = "Bring up infra and bootstrap OpenFGA store (idempotent)."
command = "docker"
args = ["compose", "-f", "infra/docker-compose.infra.yml", "--profile", "init", "up", "-d"]

# ---------------------------------------------------------------- Native services
# Run the app on the host (not in containers) so breakpoints / hot-reload work
# and RustRover's debugger can attach.

[tasks.run-server]
description = "Run the backend server natively."
command = "cargo"
args = ["run", "--bin", "server"]
env = { RUST_LOG = "info,portal=debug" }

[tasks.run-workers]
description = "Run the background workers natively."
command = "cargo"
args = ["run", "--bin", "workers"]
env = { RUST_LOG = "info,portal=debug" }

[tasks.run-frontend]
description = "Run the Leptos dev server (trunk serve, port 8081)."
cwd = "./crates/frontend"
command = "trunk"
args = ["serve"]

# ---------------------------------------------------------------- Full stack

[tasks.run-all]
description = "Run server + workers + frontend natively in parallel."
run_task = { name = ["run-server", "run-workers", "run-frontend"], parallel = true }

# ---------------------------------------------------------------- Quality

[tasks.test]
description = "Run all tests (unit, integration, doc) across the workspace."
command = "cargo"
args = ["test", "--workspace"]

[tasks.clippy]
description = "Lint with clippy, deny warnings."
command = "cargo"
args = ["clippy", "--workspace", "--all-targets", "--", "-D", "warnings"]

[tasks.build]
description = "Build the entire workspace."
command = "cargo"
args = ["build", "--workspace"]
