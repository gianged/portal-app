name: portal

# Main stack: Postgres + ScyllaDB + Redis + OpenFGA, plus the Rust app
# (server, workers, frontend). Daemons only — bootstrap (OpenFGA migrate,
# schemas, store) and backups live in scripts/overlays, run on demand.
#
# Bootstrap (first run / after down -v):
#         cargo make bootstrap
# Run:    docker compose -f infra/docker-compose.yml up -d
# Backup: cargo make backup        (on-demand host script -> ./backups)
# Tear:   docker compose -f infra/docker-compose.yml down          (keeps data)
#         docker compose -f infra/docker-compose.yml down -v       (WIPES data)
#
# Overlay for dev (cargo-watch + trunk serve):
#         docker compose -f infra/docker-compose.yml -f infra/docker-compose.dev.yml up

services:
  # ---------------------------------------------------------------- Postgres
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    # Sized for ~1000 users: server(32) + workers(16) + OpenFGA pools with headroom.
    command:
      - postgres
      - -c
      - max_connections=200
      - -c
      - shared_buffers=512MB
      - -c
      - effective_cache_size=1536MB
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2g
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-portal}
      POSTGRES_USER: ${POSTGRES_USER:-portal}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-portal}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      # Whole directory mounted ro: image runs *.sh then *.sql in name order
      # on first start only (when the data dir is empty). 00- before 10-.
      - ./postgres:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-portal} -d ${POSTGRES_DB:-portal}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------- ScyllaDB
  scylla:
    image: scylladb/scylla:5.4
    restart: unless-stopped
    # Dev-sized single node. Production: 2+ nodes, real --smp/--memory, drop
    # --overprovisioned, NetworkTopologyStrategy RF>=2 in the keyspace.
    command: --smp 1 --memory 1G --overprovisioned 1 --reactor-backend=epoll
    # No memory limit: Seastar's probe misreads the cgroup cap under Docker
    # Desktop/WSL2 and refuses to boot; --memory 1G already bounds the heap.
    deploy:
      resources:
        limits:
          cpus: "2.0"
    volumes:
      - scylla-data:/var/lib/scylla
    healthcheck:
      test: ["CMD-SHELL", "cqlsh -e 'SELECT now() FROM system.local'"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

  # ------------------------------------------------------------------- Redis
  # AUTH is mandatory: sessions, rate limiting, and the job queues all live
  # here, so an open Redis is an auth/rate-limit bypass.
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    # noeviction: job queues + chat spool live here — reject writes at the cap
    # instead of silently evicting them.
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "256mb", "--maxmemory-policy", "noeviction", "--requirepass", "${REDIS_PASSWORD:?REDIS_PASSWORD is required — set it in .env}"]
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512m
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$$REDIS_PASSWORD\" --no-auth-warning ping | grep PONG"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ---------------------------------------------------------------- OpenFGA
  openfga:
    image: openfga/openfga:v1.5.4
    restart: unless-stopped
    command: run
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512m
    environment:
      OPENFGA_DATASTORE_ENGINE: postgres
      OPENFGA_DATASTORE_MAX_OPEN_CONNS: "30"
      # sslmode is parameterized: dev keeps `disable` (in-network Docker DNS,
      # no certs); production should set OPENFGA_DATASTORE_SSLMODE=require.
      OPENFGA_DATASTORE_URI: postgres://${POSTGRES_USER:-portal}:${POSTGRES_PASSWORD:-portal}@postgres:5432/openfga?sslmode=${OPENFGA_DATASTORE_SSLMODE:-disable}
      OPENFGA_LOG_LEVEL: info
      OPENFGA_LOG_FORMAT: json
      OPENFGA_HTTP_ADDR: 0.0.0.0:8080
      OPENFGA_GRPC_ADDR: 0.0.0.0:8081
      OPENFGA_PLAYGROUND_ENABLED: "false"
      # The API guards the whole authorization graph — require the same token
      # the server presents.
      OPENFGA_AUTHN_METHOD: preshared
      OPENFGA_AUTHN_PRESHARED_KEYS: ${OPENFGA_BEARER_TOKEN:?OPENFGA_BEARER_TOKEN is required — set it in .env}
    # Not exposed externally — only the in-network server/workers reach it (the
    # dev overlay adds host ports). Datastore must be migrated first via
    # `cargo make bootstrap`; until then OpenFGA crash-loops and restart recovers it.
    depends_on:
      postgres:
        condition: service_healthy

  # ------------------------------------------------------------------ Server
  server:
    build:
      context: ..
      dockerfile: Dockerfile
      target: runtime
      args:
        BINARY_NAME: server
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1g
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-portal}:${POSTGRES_PASSWORD:-portal}@postgres:5432/${POSTGRES_DB:-portal}
      REDIS_URL: redis://:${REDIS_PASSWORD:?REDIS_PASSWORD is required — set it in .env}@redis:6379
      SCYLLA_HOSTS: scylla:9042
      SCYLLA_KEYSPACE: ${SCYLLA_KEYSPACE:-portal_chat}
      OPENFGA_API_URL: http://openfga:8080
      OPENFGA_MODEL_PATH: /openfga/authorization-model.json
      OPENFGA_BEARER_TOKEN: ${OPENFGA_BEARER_TOKEN:?OPENFGA_BEARER_TOKEN is required — set it in .env}
      STORAGE_ROOT: /app/storage
      SERVER_HOST: 0.0.0.0
      SERVER_PORT: 8080
      RUST_LOG: ${RUST_LOG:-info,portal=debug}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required — set it in .env}
      STORAGE_SIGNING_SECRET: ${STORAGE_SIGNING_SECRET:?STORAGE_SIGNING_SECRET is required — set it in .env}
      SESSION_TTL_HOURS: ${SESSION_TTL_HOURS:-24}
    ports:
      - "${SERVER_HOST_PORT:-8080}:8080"
    volumes:
      - ../storage:/app/storage
      - ./openfga:/openfga:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      scylla:
        condition: service_healthy
      openfga:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  # ----------------------------------------------------------------- Workers
  workers:
    build:
      context: ..
      dockerfile: Dockerfile
      target: runtime
      args:
        BINARY_NAME: workers
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512m
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-portal}:${POSTGRES_PASSWORD:-portal}@postgres:5432/${POSTGRES_DB:-portal}
      REDIS_URL: redis://:${REDIS_PASSWORD:?REDIS_PASSWORD is required — set it in .env}@redis:6379
      SCYLLA_HOSTS: scylla:9042
      SCYLLA_KEYSPACE: ${SCYLLA_KEYSPACE:-portal_chat}
      OPENFGA_API_URL: http://openfga:8080
      OPENFGA_MODEL_PATH: /openfga/authorization-model.json
      OPENFGA_BEARER_TOKEN: ${OPENFGA_BEARER_TOKEN:?OPENFGA_BEARER_TOKEN is required — set it in .env}
      STORAGE_ROOT: /app/storage
      RUST_LOG: ${RUST_LOG:-info,portal=debug}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required — set it in .env}
      SESSION_TTL_HOURS: ${SESSION_TTL_HOURS:-24}
    volumes:
      - ../storage:/app/storage
      - ./openfga:/openfga:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      scylla:
        condition: service_healthy
      openfga:
        condition: service_started

  # ---------------------------------------------------------------- Frontend
  frontend:
    build:
      context: ..
      dockerfile: Dockerfile.frontend
      target: runtime
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128m
    ports:
      - "${FRONTEND_HOST_PORT:-80}:80"
    depends_on:
      - server

volumes:
  postgres-data:
  scylla-data:
  redis-data:
  openfga-config:
