name: portal

# Main stack: brings up Postgres + ScyllaDB + Redis + OpenFGA, plus the Rust
# app (server, workers, frontend). Postgres + ScyllaDB schemas are
# initialized on first run; daily backups are written to named volumes with
# configurable retention.
#
# Run:    docker compose -f infra/docker-compose.yml up -d
# Init:   docker compose -f infra/docker-compose.yml --profile init up openfga-init
# Tear:   docker compose -f infra/docker-compose.yml down          (keeps data)
#         docker compose -f infra/docker-compose.yml down -v       (WIPES data + backups)
#
# Overlay for dev (cargo-watch + trunk serve):
#         docker compose -f infra/docker-compose.yml -f infra/docker-compose.dev.yml up

services:
  # ---------------------------------------------------------------- Postgres
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-portal}
      POSTGRES_USER: ${POSTGRES_USER:-portal}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-portal}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      # Whole directory mounted ro: image runs *.sh then *.sql in name order
      # on first start only (when the data dir is empty). 00- before 10-.
      - ./postgres:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-portal} -d ${POSTGRES_DB:-portal}"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-backup:
    image: prodrigestivill/postgres-backup-local:16
    restart: unless-stopped
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_DB: ${POSTGRES_DB:-portal},openfga
      POSTGRES_USER: ${POSTGRES_USER:-portal}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-portal}
      SCHEDULE: ${BACKUP_SCHEDULE:-@daily}
      BACKUP_KEEP_DAYS: ${BACKUP_KEEP_DAYS:-7}
      BACKUP_KEEP_WEEKS: ${BACKUP_KEEP_WEEKS:-0}
      BACKUP_KEEP_MONTHS: ${BACKUP_KEEP_MONTHS:-0}
      POSTGRES_EXTRA_OPTS: "-Z6 --blobs"
    volumes:
      - postgres-backups:/backups
    depends_on:
      postgres:
        condition: service_healthy

  # ---------------------------------------------------------------- ScyllaDB
  scylla:
    image: scylladb/scylla:5.4
    restart: unless-stopped
    command: --smp 1 --memory 1G --overprovisioned 1 --reactor-backend=epoll
    volumes:
      - scylla-data:/var/lib/scylla
    healthcheck:
      test: ["CMD-SHELL", "cqlsh -e 'SELECT now() FROM system.local'"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

  scylla-init:
    image: scylladb/scylla:5.4
    restart: "no"
    depends_on:
      scylla:
        condition: service_healthy
    volumes:
      - ./cassandra/schema.cql:/schema.cql:ro
    entrypoint: ["sh", "-c", "cqlsh scylla -f /schema.cql && echo '[scylla-init] schema applied'"]

  scylla-backup:
    image: docker:27-cli
    restart: unless-stopped
    depends_on:
      scylla:
        condition: service_healthy
    environment:
      BACKUP_SCHEDULE: ${SCYLLA_BACKUP_CRON:-0 3 * * *}
      BACKUP_KEEP_DAYS: ${BACKUP_KEEP_DAYS:-7}
      KEYSPACE: ${CASSANDRA_KEYSPACE:-portal_chat}
    volumes:
      # SECURITY: the docker socket is mounted read-only so this sidecar can
      # `docker exec` into the scylla container. Standard pattern for
      # dev/staging; revisit before any prod-grade deployment.
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - scylla-backups:/backups
      - ./backup/scylla-backup.sh:/scylla-backup.sh:ro
    entrypoint:
      - sh
      - -c
      - |
        set -eu
        apk add --no-cache dcron findutils coreutils >/dev/null
        chmod +x /scylla-backup.sh
        echo "$$BACKUP_SCHEDULE /scylla-backup.sh >> /proc/1/fd/1 2>&1" | crontab -
        echo "[scylla-backup] cron installed: $$BACKUP_SCHEDULE"
        crond -f -l 8

  # ------------------------------------------------------------------- Redis
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ---------------------------------------------------------------- OpenFGA
  openfga-migrate:
    image: openfga/openfga:v1.5.4
    restart: "no"
    command: migrate
    environment:
      OPENFGA_DATASTORE_ENGINE: postgres
      OPENFGA_DATASTORE_URI: postgres://${POSTGRES_USER:-portal}:${POSTGRES_PASSWORD:-portal}@postgres:5432/openfga?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy

  openfga:
    image: openfga/openfga:v1.5.4
    restart: unless-stopped
    command: run
    environment:
      OPENFGA_DATASTORE_ENGINE: postgres
      OPENFGA_DATASTORE_URI: postgres://${POSTGRES_USER:-portal}:${POSTGRES_PASSWORD:-portal}@postgres:5432/openfga?sslmode=disable
      OPENFGA_LOG_LEVEL: info
      OPENFGA_LOG_FORMAT: json
      OPENFGA_HTTP_ADDR: 0.0.0.0:8080
      OPENFGA_GRPC_ADDR: 0.0.0.0:8081
      OPENFGA_PLAYGROUND_ENABLED: "false"
    depends_on:
      openfga-migrate:
        condition: service_completed_successfully
    # Intentionally NOT exposed externally in the main compose — only the
    # in-network server/workers need to reach it. Dev overlay exposes ports
    # for host-side debugging.

  openfga-init:
    image: alpine/curl:8.10.1
    restart: "no"
    profiles: ["init"]
    depends_on:
      openfga:
        condition: service_started
    volumes:
      - ./openfga:/openfga:ro
      - openfga-config:/config
    entrypoint: ["/bin/sh", "/openfga/openfga-init.sh"]

  # ------------------------------------------------------------------ Server
  server:
    build:
      context: ..
      dockerfile: Dockerfile
      target: runtime
      args:
        BINARY_NAME: server
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-portal}:${POSTGRES_PASSWORD:-portal}@postgres:5432/${POSTGRES_DB:-portal}
      REDIS_URL: redis://redis:6379
      CASSANDRA_HOSTS: scylla:9042
      CASSANDRA_KEYSPACE: ${CASSANDRA_KEYSPACE:-portal_chat}
      OPENFGA_API_URL: http://openfga:8080
      OPENFGA_STORE_ID: ${OPENFGA_STORE_ID:-}
      STORAGE_ROOT: /app/storage
      SERVER_HOST: 0.0.0.0
      SERVER_PORT: 8080
      RUST_LOG: ${RUST_LOG:-info,portal=debug}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required — set it in .env}
      SESSION_TTL_HOURS: ${SESSION_TTL_HOURS:-24}
    ports:
      - "${SERVER_HOST_PORT:-8080}:8080"
    volumes:
      - ../storage:/app/storage
      - openfga-config:/config:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      scylla-init:
        condition: service_completed_successfully
      openfga:
        condition: service_started
    # No healthcheck yet — server::main is empty. Add a /health route and a
    # HEALTHCHECK directive in the same change that implements startup.

  # ----------------------------------------------------------------- Workers
  workers:
    build:
      context: ..
      dockerfile: Dockerfile
      target: runtime
      args:
        BINARY_NAME: workers
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-portal}:${POSTGRES_PASSWORD:-portal}@postgres:5432/${POSTGRES_DB:-portal}
      REDIS_URL: redis://redis:6379
      CASSANDRA_HOSTS: scylla:9042
      CASSANDRA_KEYSPACE: ${CASSANDRA_KEYSPACE:-portal_chat}
      OPENFGA_API_URL: http://openfga:8080
      OPENFGA_STORE_ID: ${OPENFGA_STORE_ID:-}
      STORAGE_ROOT: /app/storage
      RUST_LOG: ${RUST_LOG:-info,portal=debug}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required — set it in .env}
      SESSION_TTL_HOURS: ${SESSION_TTL_HOURS:-24}
    volumes:
      - ../storage:/app/storage
      - openfga-config:/config:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      scylla-init:
        condition: service_completed_successfully
      openfga:
        condition: service_started

  # ---------------------------------------------------------------- Frontend
  frontend:
    build:
      context: ..
      dockerfile: Dockerfile.frontend
      target: runtime
    restart: unless-stopped
    ports:
      - "${FRONTEND_HOST_PORT:-80}:80"
    depends_on:
      - server

volumes:
  postgres-data:
  postgres-backups:
  scylla-data:
  scylla-backups:
  redis-data:
  openfga-config:
