server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Baseline security headers. No HSTS: transport is plain HTTP on the
    # internal network for now. NOTE: nginx add_header inheritance is
    # all-or-nothing — any location with its own add_header must repeat these.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'wasm-unsafe-eval' 'nonce-$request_id'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob:; connect-src 'self' ws: wss:; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'" always;

    # Trunk bakes nonce="{{__TRUNK NONCE__}}" into the inline bootstrap script.
    # Rewrite it per request to $request_id (unique, unpredictable) so it matches
    # the 'nonce-$request_id' in the CSP above. Only acts on text/html, so the
    # hashed JS/WASM/CSS assets are untouched. Inherited by all locations below.
    sub_filter_once off;
    sub_filter_types text/html;
    sub_filter '{{__TRUNK NONCE__}}' '$request_id';

    # Don't cache the entry HTML; users must always pull the latest manifest.
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        # Re-declare the server-level headers: this block's add_header drops them.
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "no-referrer" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'wasm-unsafe-eval' 'nonce-$request_id'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob:; connect-src 'self' ws: wss:; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'" always;
    }

    # Trunk hashes asset filenames; safe to cache aggressively.
    location ~* \.(?:js|wasm|css|woff2?|ttf|png|jpg|jpeg|svg|webp)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        # Re-declare the server-level headers: this block's add_header drops them.
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "no-referrer" always;
        try_files $uri =404;
    }

    # Chat WebSocket: the SPA opens /api/chat/ws; exact match wins over the
    # /api/ prefix below so this one gets the Upgrade headers.
    location = /api/chat/ws {
        proxy_pass http://server:8080/api/v1/chat/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # API → Rust server. The SPA calls /api/...; the server mounts /api/v1/...
    # (same bridge the Trunk dev proxy does).
    location /api/ {
        proxy_pass http://server:8080/api/v1/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # WebSocket → Rust server. Needs Upgrade/Connection headers.
    location /ws/ {
        proxy_pass http://server:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # SPA fallback: every other path resolves to index.html so client-side
    # routing works on refresh.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
