server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # WASM mime type — newer nginx images include it, older ones don't.
    types {
        application/wasm wasm;
    }

    # Don't cache the entry HTML; users must always pull the latest manifest.
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # Trunk hashes asset filenames; safe to cache aggressively.
    location ~* \.(?:js|wasm|css|woff2?|ttf|png|jpg|jpeg|svg|webp)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # API → Rust server.
    location /api/ {
        proxy_pass http://server:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # WebSocket → Rust server. Needs Upgrade/Connection headers.
    location /ws/ {
        proxy_pass http://server:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # SPA fallback: every other path resolves to index.html so client-side
    # routing works on refresh.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
